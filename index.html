<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Runner Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Evita zoom indesejado ao dar dois toques na tela do celular */
            touch-action: manipulation; 
        }
        body {
            background: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
            padding: 10px;
        }
        #gameCanvas {
            background: #fff;
            border-bottom: 2px solid #535353;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="250"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Contexto de Áudio para criar sons via código
let audioCtx = null;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playSound(type) {
    if (!audioCtx) return;
    
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'jump') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'score') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'hit') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(120, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }
}

// Configurações do Jogo
let score = 0;
let highScore = localStorage.getItem("dinoHighScore") ? parseInt(localStorage.getItem("dinoHighScore")) : 0;
let gameOver = false;
let gameSpeed = 5;

// Configurações do Dinossauro (Bloco Azul)
const dino = {
    x: 50,
    y: 190,
    width: 30,
    height: 40,
    vy: 0,
    gravity: 0.6,
    jumpForce: -12,
    isJumping: false
};

// Configurações dos Obstáculos (Blocos Vermelhos)
const obstacles = [];
const obstacleConfig = {
    width: 20,
    height: 40,
    minInterval: 80,
    nextInterval: 100
};
let frameCount = 0;

// Função principal de interação (Garante que funciona em PC e Celular)
function handleAction() {
    initAudio(); // Ativa áudio no primeiro clique
    
    if (!gameOver && !dino.isJumping) {
        dino.vy = dino.jumpForce;
        dino.isJumping = true;
        playSound('jump');
    } else if (gameOver) {
        resetGame();
    }
}

// Captura de comandos do Computador (Teclado)
window.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "ArrowUp") {
        e.preventDefault(); // Evita que a página role para baixo ao apertar Espaço
        handleAction();
    }
});

// Captura de comandos do Celular (Toque na Tela)
window.addEventListener("touchstart", (e) => {
    e.preventDefault(); // Evita comportamentos de zoom ou rolagem do navegador
    handleAction();
}, { passive: false });

function spawnObstacle() {
    frameCount++;
    if (frameCount > obstacleConfig.nextInterval) {
        obstacles.push({
            x: canvas.width,
            y: canvas.height - obstacleConfig.height,
            width: obstacleConfig.width,
            height: obstacleConfig.height
        });
        frameCount = 0;
        obstacleConfig.nextInterval = Math.floor(Math.random() * 60) + obstacleConfig.minInterval;
    }
}

function update() {
    if (gameOver) return;

    // Física do Dinossauro
    dino.vy += dino.gravity;
    dino.y += dino.vy;

    // Colisão com o chão
    const groundY = canvas.height - dino.height;
    if (dino.y > groundY) {
        dino.y = groundY;
        dino.vy = 0;
        dino.isJumping = false;
    }

    // Movimentação dos obstáculos
    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= gameSpeed;

        // Detecção de colisão
        if (
            dino.x < obstacles[i].x + obstacles[i].width &&
            dino.x + dino.width > obstacles[i].x &&
            dino.y < obstacles[i].y + obstacles[i].height &&
            dino.y + dino.height > obstacles[i].y
        ) {
            gameOver = true;
            playSound('hit');
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("dinoHighScore", highScore);
            }
        }

        // Remove obstáculos e soma pontos
        if (!gameOver && obstacles[i].x + obstacles[i].width < 0) {
            obstacles.splice(i, 1);
            score++;
            playSound('score');
            
            if (score % 5 === 0) gameSpeed += 0.5;
        }
    }

    spawnObstacle();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Desenha o Dinossauro (Retângulo Azul)
    ctx.fillStyle = "#2196F3";
    ctx.fillRect(dino.x, dino.y, dino.width, dino.height);

    // Desenha os Obstáculos (Retângulos Vermelhos)
    ctx.fillStyle = "#F44336";
    for (let obs of obstacles) {
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
    }

    // Desenha a Pontuação Atual e o Recorde
    ctx.fillStyle = "#535353";
    ctx.font = "18px Arial";
    ctx.textAlign = "right";
    ctx.fillText(`HI: ${highScore}   Score: ${score}`, canvas.width - 20, 30);

    // Tela de Game Over
    if (gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#fff";
        ctx.font = "30px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 10);
        ctx.font = "18px Arial";
        ctx.fillText("Toque na tela ou ESPAÇO para reiniciar", canvas.width / 2, canvas.height / 2 + 25);
    }
}

function resetGame() {
    score = 0;
    gameOver = false;
    gameSpeed = 5;
    obstacles.length = 0;
    dino.y = canvas.height - dino.height;
    dino.vy = 0;
    frameCount = 0;
    loop();
}

function loop() {
    update();
    draw();
    if (!gameOver) {
        requestAnimationFrame(loop);
    }
}

loop();
</script>
</body>
</html>
