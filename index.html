<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Runner Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-box-sizing: border-box;
        }
        body {
            background: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #gameCanvas {
            background: #fff;
            border-bottom: 2px solid #535353;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="250"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Configurações do Jogo
let score = 0;
let gameOver = false;
let gameSpeed = 5;

// Configurações do Dinossauro (Bloco Azul)
const dino = {
    x: 50,
    y: 190,
    width: 30,
    height: 40,
    vy: 0,
    gravity: 0.6,
    jumpForce: -12,
    isJumping: false
};

// Configurações dos Obstáculos (Blocos Vermelhos)
const obstacles = [];
const obstacleConfig = {
    width: 20,
    height: 40,
    minInterval: 80,
    nextInterval: 100
};
let frameCount = 0;

// Captura de comandos (Espaço ou Seta para Cima)
window.addEventListener("keydown", (e) => {
    if ((e.code === "Space" || e.code === "ArrowUp") && !dino.isJumping && !gameOver) {
        dino.vy = dino.jumpForce;
        dino.isJumping = true;
    }
    if (gameOver && e.code === "Space") {
        resetGame();
    }
});

function spawnObstacle() {
    frameCount++;
    if (frameCount > obstacleConfig.nextInterval) {
        obstacles.push({
            x: canvas.width,
            y: canvas.height - obstacleConfig.height,
            width: obstacleConfig.width,
            height: obstacleConfig.height
        });
        frameCount = 0;
        // Define o tempo aleatório para o próximo obstáculo
        obstacleConfig.nextInterval = Math.floor(Math.random() * 60) + obstacleConfig.minInterval;
    }
}

function update() {
    if (gameOver) return;

    // Física do Dinossauro
    dino.vy += dino.gravity;
    dino.y += dino.vy;

    // Colisão com o chão
    const groundY = canvas.height - dino.height;
    if (dino.y > groundY) {
        dino.y = groundY;
        dino.vy = 0;
        dino.isJumping = false;
    }

    // Movimentação dos obstáculos
    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= gameSpeed;

        // Detecção de colisão (AABB)
        if (
            dino.x < obstacles[i].x + obstacles[i].width &&
            dino.x + dino.width > obstacles[i].x &&
            dino.y < obstacles[i].y + obstacles[i].height &&
            dino.y + dino.height > obstacles[i].y
        ) {
            gameOver = true;
        }

        // Remove obstáculos que saíram da tela e soma pontos
        if (obstacles[i].x + obstacles[i].width < 0) {
            obstacles.splice(i, 1);
            score++;
            // Aumenta a velocidade gradualmente
            if (score % 5 === 0) gameSpeed += 0.5;
        }
    }

    spawnObstacle();
}

function draw() {
    // Limpa a tela
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Desenha o Dinossauro (Retângulo Azul)
    ctx.fillStyle = "#2196F3";
    ctx.fillRect(dino.x, dino.y, dino.width, dino.height);

    // Desenha os Obstáculos (Retângulos Vermelhos)
    ctx.fillStyle = "#F44336";
    for (let obs of obstacles) {
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
    }

    // Desenha a Pontuação
    ctx.fillStyle = "#535353";
    ctx.font = "20px Arial";
    ctx.fillText(`Score: ${score}`, canvas.width - 120, 30);

    // Tela de Game Over
    if (gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#fff";
        ctx.font = "30px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 10);
        ctx.font = "18px Arial";
        ctx.fillText("Pressione ESPAÇO para reiniciar", canvas.width / 2, canvas.height / 2 + 25);
        ctx.textAlign = "left"; // Reseta o alinhamento
    }
}

function resetGame() {
    score = 0;
    gameOver = false;
    gameSpeed = 5;
    obstacles.length = 0;
    dino.y = canvas.height - dino.height;
    dino.vy = 0;
    frameCount = 0;
    loop();
}

function loop() {
    update();
    draw();
    if (!gameOver) {
        requestAnimationFrame(loop);
    }
}

// Inicia o jogo
loop();
</script>
</body>
</html>
