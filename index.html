<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Runner Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
            touch-action: manipulation; 
        }
        #gameCanvas {
            background: #fff;
            border-bottom: 2px solid #535353;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="250"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Lista de obstáculos fornecida por você
const obstacleEmojis = [
    "🦛","🦒","🦍","🐒","🐆","🐪","🐫","🐦","🐓","🐔",
    "🐣","🐤","🐥","  ","🦆","🦢","🦤","🦜","🦉","🦅",
    "🌱","☘️","🍀","🪴","🌵","🌴","🌵","🔥","⚡","☀️"
];

let audioCtx = null;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playSound(type) {
    if (!audioCtx) return;
    
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'jump') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'score') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'hit') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(120, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }
}

// Configurações do Jogo
let score = 0;
let highScore = localStorage.getItem("dinoHighScore") ? parseInt(localStorage.getItem("dinoHighScore")) : 0;
let gameOver = false;
let gameSpeed = 5;

// Configurações do Personagem Principal (Mamute)
const dino = {
    x: 50,
    y: 190,
    width: 35,
    height: 35,
    vy: 0,
    gravity: 0.6,
    jumpForce: -12,
    isJumping: false,
    emoji: "🦣"
};

// Configurações dos Obstáculos
const obstacles = [];
const obstacleConfig = {
    width: 35,
    height: 35,
    minInterval: 80,
    nextInterval: 100
};
let frameCount = 0;

function handleAction() {
    initAudio();
    
    if (!dino.isJumping && !gameOver) {
        dino.vy = dino.jumpForce;
        dino.isJumping = true;
        playSound('jump');
    }
    if (gameOver) {
        resetGame();
    }
}

window.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "ArrowUp") {
        e.preventDefault();
        handleAction();
    }
});

window.addEventListener("touchstart", (e) => {
    e.preventDefault();
    handleAction();
}, { passive: false });

function spawnObstacle() {
    frameCount++;
    if (frameCount > obstacleConfig.nextInterval) {
        const randomEmoji = obstacleEmojis[Math.floor(Math.random() * obstacleEmojis.length)];
        
        obstacles.push({
            x: canvas.width,
            y: canvas.height - obstacleConfig.height,
            width: obstacleConfig.width,
            height: obstacleConfig.height,
            emoji: randomEmoji
        });
        frameCount = 0;
        obstacleConfig.nextInterval = Math.floor(Math.random() * 60) + obstacleConfig.minInterval;
    }
}

function update() {
    if (gameOver) return;

    dino.vy += dino.gravity;
    dino.y += dino.vy;

    const groundY = canvas.height - dino.height;
    if (dino.y > groundY) {
        dino.y = groundY;
        dino.vy = 0;
        dino.isJumping = false;
    }

    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= gameSpeed;

        // Detecção de colisão (com margem de ajuste fino)
        if (
            dino.x + 5 < obstacles[i].x + obstacles[i].width &&
            dino.x + dino.width - 5 > obstacles[i].x &&
            dino.y + 5 < obstacles[i].y + obstacles[i].height &&
            dino.y + dino.height > obstacles[i].y
        ) {
            gameOver = true;
            playSound('hit');
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("dinoHighScore", highScore);
            }
        }

        if (!gameOver && obstacles[i].x + obstacles[i].width < 0) {
            obstacles.splice(i, 1);
            score++;
            playSound('score');
            
            if (score % 5 === 0) gameSpeed += 0.5;
        }
    }

    spawnObstacle();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Desenha a linha do chão
    ctx.strokeStyle = "#535353";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height);
    ctx.lineTo(canvas.width, canvas.height);
    ctx.stroke();

    ctx.textBaseline = "top";

    // DESENHA O MAMUTE ESPELHADO (Para olhar para a direita)
    ctx.save(); // Salva o estado atual do canvas
    ctx.font = `${dino.height}px Arial`;
    // Move a origem para a posição X do mamute mais a sua largura para o espelhamento funcionar no lugar certo
    ctx.translate(dino.x + dino.width, dino.y); 
    ctx.scale(-1, 1); // Inverte horizontalmente
    ctx.textAlign = "left";
    ctx.fillText(dino.emoji, 0, 0); // Desenha na posição corrigida
    ctx.restore(); // Restaura o canvas para o padrão para não afetar os outros elementos

    // Desenha os Obstáculos Aleatórios (Olhando para a esquerda normalmente)
    ctx.textAlign = "left";
    for (let obs of obstacles) {
        ctx.font = `${obs.height}px Arial`;
        ctx.fillText(obs.emoji, obs.x, obs.y);
    }

    // Desenha a Pontuação Atual e o Recorde
    ctx.fillStyle = "#535353";
    ctx.font = "18px Arial";
    ctx.textAlign = "right";
    ctx.fillText(`HI: ${highScore}   Score: ${score}`, canvas.width - 20, 30);

    // Tela de Game Over
    if (gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#fff";
        ctx.font = "30px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 10);
        ctx.font = "18px Arial";
        ctx.fillText("Toque na tela ou Espaço para reiniciar", canvas.width / 2, canvas.height / 2 + 25);
    }
}

function resetGame() {
    score = 0;
    gameOver = false;
    gameSpeed = 5;
    obstacles.length = 0;
    dino.y = canvas.height - dino.height;
    dino.vy = 0;
    frameCount = 0;
    loop();
}

function loop() {
    update();
    draw();
    if (!gameOver) {
        requestAnimationFrame(loop);
    }
}

loop();
</script>
</body>
</html>
